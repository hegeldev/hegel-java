name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Lint
        run: just lint

      - name: Install zizmor
        run: pip install zizmor==1.23.1
      - name: Run zizmor
        run: zizmor --format plain .github/

  test:
    name: "test (java ${{ matrix.java-version }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java-version: ["22", "25"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Test with 100% coverage enforcement
        env:
          # scripts/fetch_natives.py (run in Maven's generate-resources phase) bundles the
          # matching libhegel natives into the jar; the host's native is then unpacked and run
          # in-process. The token only raises the GitHub API rate limit for asset discovery.
          GITHUB_TOKEN: ${{ github.token }}
        run: just coverage

  test-os:
    name: "test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Test
        env:
          # Raises the GitHub API rate limit for fetch_natives.py asset discovery.
          GITHUB_TOKEN: ${{ github.token }}
        run: just test

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Build Javadoc
        run: just check-docs

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-java'
    needs: [lint, test, test-os, docs]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}
          repositories: hegel-java

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Java and signing
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
          # Templates ~/.m2/settings.xml with a <server id="central"> entry whose
          # username/password read from the env vars of the same name at deploy time.
          server-id: central
          server-username: CENTRAL_TOKEN_USER
          server-password: CENTRAL_TOKEN_PASS
          # Imports the release key into the runner's keyring for the gpg plugin.
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          CENTRAL_TOKEN_USER: ${{ secrets.CENTRAL_TOKEN_USER }}
          CENTRAL_TOKEN_PASS: ${{ secrets.CENTRAL_TOKEN_PASS }}
          # Fingerprint of the Hegel release signing key (public). Pins which key signs the
          # release so a wrong/missing key fails the build instead of signing with gpg's default.
          # If the key is ever rotated, update this alongside the GPG_PRIVATE_KEY secret.
          GPG_KEYNAME: C186BF0E8891449F3B1C17A9A73C7B80C255320A
          # Raises the GitHub API rate limit for fetch_natives.py asset discovery.
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/release.py release

      - name: Push to main or open PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python .github/scripts/release.py push-or-pr
