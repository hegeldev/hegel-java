name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Lint
        run: just lint

      - name: Install zizmor
        run: pip install zizmor==1.23.1
      - name: Run zizmor
        run: zizmor --format plain .github/

  test:
    name: "test (java ${{ matrix.java-version }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java-version: ["22", "25"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Stage libhegel from the matching GitHub release
        id: libhegel
        run: |
          set -euo pipefail
          VERSION=$(grep -oP 'LIBHEGEL_VERSION = "\K[^"]+' src/main/java/dev/hegel/LibraryLoader.java)
          ASSET="libhegel-linux-amd64.so"
          URL_BASE="https://github.com/hegeldev/hegel-rust/releases/download/v${VERSION}"
          DEST="${RUNNER_TEMP}/libhegel.so"
          curl -fsSL -o "${DEST}" "${URL_BASE}/${ASSET}"
          curl -fsSL -o "${DEST}.sha256" "${URL_BASE}/${ASSET}.sha256"
          # The published .sha256 file is GNU sha256sum style: <digest>  <asset>.
          WANT=$(awk '{print $1}' "${DEST}.sha256")
          echo "${WANT}  ${DEST}" | sha256sum -c -
          echo "path=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Test with 100% coverage enforcement
        env:
          # An explicit path disables the auto-downloader; the engine runs in-process.
          HEGEL_LIBHEGEL_PATH: ${{ steps.libhegel.outputs.path }}
        run: just coverage

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Build Javadoc
        run: just docs
