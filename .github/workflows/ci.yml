name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Lint
        run: just lint

      - name: Install zizmor
        run: pip install zizmor==1.23.1
      - name: Run zizmor
        run: zizmor --format plain .github/

  test:
    name: "test (java ${{ matrix.java-version }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java-version: ["22", "25"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Test with 100% coverage enforcement
        env:
          # scripts/fetch_natives.py (run in Maven's generate-resources phase) bundles the
          # matching libhegel natives into the jar; the host's native is then unpacked and run
          # in-process. The token only raises the GitHub API rate limit for asset discovery.
          GITHUB_TOKEN: ${{ github.token }}
        run: just coverage

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Build Javadoc
        run: just docs
